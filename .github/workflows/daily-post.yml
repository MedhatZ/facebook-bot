name: Daily Facebook Post

on:
  schedule:
    # 1:00 PM Cairo (UTC+2) = 11:00 AM UTC
    - cron: '0 11 * * *'
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: facebook-bot

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: facebook-bot/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Generate and post to Facebook
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_ENDPOINT: ${{ secrets.ANTHROPIC_ENDPOINT }}
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
          POST_HOUR: '13'
          POST_MINUTE: '0'
          TIMEZONE: Africa/Cairo
        run: node index.js --now
